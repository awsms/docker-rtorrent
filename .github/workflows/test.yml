name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

env:
  BUILD_TAG: docker-rtorrent:test
  CONTAINER_NAME: rtorrent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          source: .
          targets: image-local
          set: |
            *.cache-from=type=gha,scope=build-linux-amd64
        env:
          DEFAULT_TAG: ${{ env.BUILD_TAG }}
      -
        name: Start
        run: |
          docker compose up -d
        working-directory: test
        env:
          RTORRENT_IMAGE: ${{ env.BUILD_TAG }}
          RTORRENT_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Wait for healthy container
        run: |
          for i in $(seq 1 60); do
            status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${CONTAINER_NAME}")"
            if [ "${status}" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker inspect "${CONTAINER_NAME}"
          exit 1
      -
        name: Logs
        if: always()
        run: |
          docker compose logs
        working-directory: test
        env:
          RTORRENT_IMAGE: ${{ env.BUILD_TAG }}
          RTORRENT_CONTAINER: ${{ env.CONTAINER_NAME }}
